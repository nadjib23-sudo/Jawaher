<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Watches | الساعات الفاخرة</title>
    <!-- استيراد الخطوط -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شريط التنقل -->
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">ELITE WATCHES</a>
            <div class="nav-actions">
                <button id="cart-btn" class="icon-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- الواجهة الرئيسية (Hero) -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="container hero-content">
            <h1 class="hero-title">الفخامة في كل ثانية</h1>
            <a href="#collection" class="btn btn-gold">اكتشف المجموعة</a>
        </div>
    </header>

    <!-- مجموعة المنتجات -->
    <section id="collection" class="collection section">
        <div class="container">
            <div class="section-header">
                <p class="section-subtitle">المجموعات المختارة</p>
                <h2 class="section-title">قطع استثنائية</h2>
            </div>

            <!-- فلاتر التصنيف -->
            <div class="filters">
                <button class="filter-btn active" data-filter="All">الكل</button>
                <button class="filter-btn" data-filter="Luxury">فاخرة</button>
                <button class="filter-btn" data-filter="Sport">رياضية</button>
                <button class="filter-btn" data-filter="Classic">كلاسيكية</button>
            </div>

            <!-- شبكة المنتجات -->
            <div id="product-grid" class="product-grid">
                <!-- المنتجات تظهر هنا عبر الجافا سكريبت -->
            </div>
        </div>
    </section>

    <!-- التذييل (Footer) -->
    <footer class="footer">
        <div class="container">
            <p class="footer-logo">ELITE WATCHES</p>
            <p class="footer-copy">© 2026 جميع الحقوق محفوظة لمتجر إليت</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
